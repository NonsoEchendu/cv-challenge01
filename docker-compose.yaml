services:
  frontend: 
    build:
      context: ./Dockerfile
      dockerfile: Dockerfile
    container_name: frontend
    env_file:
      - ./frontend/.env
    ports:
      - "5173:80"
    networks:
      - fastapi-network
    depends_on:
      - backend
  
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_DB=app
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=changethis123
    networks:
      - fastapi-network
    depends_on:
      - db
  
  db: 
    image: postgres:13
    container_name: db
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postrgres_data:/var/lib/postgresql/data
    networks:
      - fastapi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  fastapi-network:
    driver: bridge

volumes:
  postrgres_data: